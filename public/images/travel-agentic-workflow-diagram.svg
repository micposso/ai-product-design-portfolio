<svg width="1400" height="720" viewBox="0 0 1400 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="80" y1="60" x2="1320" y2="660" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F6F0E8"/>
      <stop offset="1" stop-color="#E7E1D7"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FFFDFC"/>
      <stop offset="1" stop-color="#F6F1EB"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1400" height="720" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#241B15" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M2 2L10 7L2 12" stroke="#6B7B54" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1400" height="720" rx="36" fill="url(#bg)"/>
  <rect x="44" y="44" width="1312" height="632" rx="32" stroke="#D1C7B9" stroke-width="2"/>

  <text x="86" y="110" fill="#221914" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="700">
    Travel Agentic Workflow
  </text>
  <text x="86" y="146" fill="#6F665E" font-family="Arial, Helvetica, sans-serif" font-size="22">
    Split trip planning under changing hours, mixed languages, and unreliable business metadata
  </text>

  <g filter="url(#shadow)">
    <rect x="86" y="196" width="240" height="120" rx="24" fill="url(#card)"/>
    <rect x="86" y="196" width="240" height="120" rx="24" stroke="#D7CEC2" stroke-width="2"/>
    <text x="114" y="234" fill="#6B7B54" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" letter-spacing="2">INPUTS</text>
    <text x="114" y="270" fill="#221914" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Traveler Context</text>
    <text x="114" y="298" fill="#5A514A" font-family="Arial, Helvetica, sans-serif" font-size="18">Location, family needs,</text>
    <text x="114" y="322" fill="#5A514A" font-family="Arial, Helvetica, sans-serif" font-size="18">holiday timing, constraints</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="384" y="166" width="300" height="180" rx="28" fill="#6B7B54"/>
    <rect x="384" y="166" width="300" height="180" rx="28" stroke="#556245" stroke-width="2"/>
    <text x="416" y="206" fill="#DCE5D0" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" letter-spacing="2">ORCHESTRATION</text>
    <text x="416" y="246" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700">OpenClaw + Scheduler</text>
    <text x="416" y="278" fill="#EEF3E8" font-family="Arial, Helvetica, sans-serif" font-size="19">Coordinates agents, timing,</text>
    <text x="416" y="304" fill="#EEF3E8" font-family="Arial, Helvetica, sans-serif" font-size="19">fallbacks, and state updates</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="742" y="116" width="256" height="118" rx="24" fill="url(#card)"/>
    <rect x="742" y="116" width="256" height="118" rx="24" stroke="#D7CEC2" stroke-width="2"/>
    <text x="770" y="152" fill="#6B7B54" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" letter-spacing="2">AGENT 01</text>
    <text x="770" y="188" fill="#221914" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Planning Agent</text>
    <text x="770" y="214" fill="#5A514A" font-family="Arial, Helvetica, sans-serif" font-size="17">Builds the day itinerary</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1036" y="116" width="256" height="118" rx="24" fill="url(#card)"/>
    <rect x="1036" y="116" width="256" height="118" rx="24" stroke="#D7CEC2" stroke-width="2"/>
    <text x="1064" y="152" fill="#6B7B54" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" letter-spacing="2">AGENT 02</text>
    <text x="1064" y="188" fill="#221914" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Places Agent</text>
    <text x="1064" y="214" fill="#5A514A" font-family="Arial, Helvetica, sans-serif" font-size="17">Finds restaurants and POIs</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="742" y="270" width="256" height="118" rx="24" fill="url(#card)"/>
    <rect x="742" y="270" width="256" height="118" rx="24" stroke="#D7CEC2" stroke-width="2"/>
    <text x="770" y="306" fill="#6B7B54" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" letter-spacing="2">AGENT 03</text>
    <text x="770" y="342" fill="#221914" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Navigation Agent</text>
    <text x="770" y="368" fill="#5A514A" font-family="Arial, Helvetica, sans-serif" font-size="17">Checks routes and walk times</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1036" y="270" width="256" height="118" rx="24" fill="url(#card)"/>
    <rect x="1036" y="270" width="256" height="118" rx="24" stroke="#D7CEC2" stroke-width="2"/>
    <text x="1064" y="306" fill="#6B7B54" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" letter-spacing="2">AGENT 04</text>
    <text x="1064" y="342" fill="#221914" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Translation Agent</text>
    <text x="1064" y="368" fill="#5A514A" font-family="Arial, Helvetica, sans-serif" font-size="17">Converts Croatian to English</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="742" y="442" width="550" height="148" rx="28" fill="url(#card)"/>
    <rect x="742" y="442" width="550" height="148" rx="28" stroke="#D7CEC2" stroke-width="2"/>
    <text x="774" y="480" fill="#6B7B54" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" letter-spacing="2">ESCALATION PATH</text>
    <text x="774" y="516" fill="#221914" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">Voice Agent via AgentPhone</text>
    <text x="774" y="546" fill="#5A514A" font-family="Arial, Helvetica, sans-serif" font-size="18">Calls local businesses for live opening hours, then translates</text>
    <text x="774" y="572" fill="#5A514A" font-family="Arial, Helvetica, sans-serif" font-size="18">responses when APIs, websites, and search results are incomplete</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="86" y="422" width="598" height="168" rx="28" fill="#241B15"/>
    <rect x="86" y="422" width="598" height="168" rx="28" stroke="#3A2C23" stroke-width="2"/>
    <text x="118" y="460" fill="#D9CFBF" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" letter-spacing="2">REAL-WORLD FAILURE MODES</text>
    <text x="118" y="498" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Stale or Missing Data</text>
    <text x="118" y="530" fill="#F0E7DA" font-family="Arial, Helvetica, sans-serif" font-size="18">Holiday hours, local exceptions, changing availability,</text>
    <text x="118" y="556" fill="#F0E7DA" font-family="Arial, Helvetica, sans-serif" font-size="18">language friction, and contradictory business metadata</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1036" y="612" width="256" height="64" rx="20" fill="#6B7B54"/>
    <text x="1068" y="652" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">WhatsApp + Local TTS</text>
  </g>

  <path d="M326 256H364" stroke="#6B7B54" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M684 256H720" stroke="#6B7B54" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M870 234V254" stroke="#6B7B54" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M998 174H1020" stroke="#6B7B54" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1126 234V254" stroke="#6B7B54" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M684 290C720 290 716 326 742 326" stroke="#6B7B54" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M684 322C734 322 714 500 742 500" stroke="#6B7B54" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M998 516H1020" stroke="#6B7B54" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M385 500H705C720 500 726 500 734 500" stroke="#A79A89" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="8 8"/>
</svg>
